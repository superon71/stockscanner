<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ronald's SGX Stock Analysis</title>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar: #161b22;
            --card: #1c2128;
            --sgx-red: #e91e63;
            --text: #c9d1d9;
            --strong: #089981;
            --mod: #71d5c2;
            --weak: #ffb347;
            --neg: #f23645;
            --scroll-gap: 40px; /* NEW: Dedicated gap for mobile navigation */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* Header with safe areas */
        .app-header {
            background: var(--sidebar);
            padding: calc(env(safe-area-inset-top) + 12px) 15px 12px 15px;
            border-bottom: 1px solid #30363d;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100;
        }

        .app-header h1 { margin: 0; font-size: 1rem; color: var(--sgx-red); text-transform: uppercase; letter-spacing: 1px; }

        .menu-btn {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
        }

        .layout-body { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* Sidebar slide-out */
        .sidebar {
            width: 280px; background: var(--sidebar); border-right: 1px solid #30363d;
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 90;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.6); }
        }

        .search-container { padding: 20px; border-bottom: 1px solid #30363d; }
        .search-container input {
            width: 100%; padding: 14px; border-radius: 10px;
            border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px;
        }

        .stock-list { flex: 1; overflow-y: auto; }
        .stock-item { padding: 18px 20px; cursor: pointer; border-bottom: 1px solid #21262d; font-size: 0.95rem; }
        .stock-item.active { background: #21262d; border-left: 4px solid var(--sgx-red); font-weight: bold; }

        /* Main Content */
        .main-content {
            flex: 1; padding: 20px 15px; overflow-y: auto;
            display: flex; flex-direction: column; align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .metric-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            border: 1px solid #30363d; width: 100%;
            max-width: 500px; box-sizing: border-box; text-align: center;
        }

        /* The "Safe Scroll Zone" Gap */
        .spacer { height: var(--scroll-gap); width: 100%; flex-shrink: 0; }

        .label { font-size: 0.75rem; font-weight: 700; color: #8b949e; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* Verdict Design */
        .verdict-box {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px;
            padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.2);
        }
        .status-icon { font-size: 1.6rem; }
        .green-text { color: var(--strong); }
        .red-text { color: var(--neg); }

        /* Gauge */
        .gauge-wrapper { position: relative; width: 200px; height: 100px; margin: 0 auto 10px; overflow: hidden; }
        .gauge-bg {
            width: 200px; height: 200px; border-radius: 50%;
            background: conic-gradient(from 270deg, var(--neg) 25%, var(--weak) 50%, var(--mod) 75%, var(--strong) 100%);
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }
        .needle {
            position: absolute; width: 4px; height: 70px; background: #fff;
            bottom: 0; left: calc(50% - 2px); transform-origin: bottom;
            transition: transform 1s ease-out; transform: rotate(-90deg);
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 85; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header class="app-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰ Stocks</button>
    <h1>Ronald's SGX Analysis</h1>
    <div style="width: 40px;"></div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout-body">
    <div class="sidebar" id="sidebar">
        <div class="search-container">
            <input type="text" id="manualSearch" placeholder="Ticker (e.g. D05)" onkeypress="handleSearch(event)">
        </div>
        <div class="stock-list" id="stockList"></div>
    </div>

    <div class="main-content">
        <!-- Card 1: Analysis -->
        <div class="metric-card">
            <span class="label" id="analysisLabel">Analysis: SGX:D05</span>
            <div id="divVerdict" class="verdict-box">
                <span id="verdictIcon" class="status-icon">⚪</span>
                <span id="verdictText">Calculating Yield...</span>
            </div>
            <div id="div-viewport" style="height: 300px; border-radius: 12px; overflow: hidden;"></div>
        </div>

        <!-- NEW: Navigation Spacer (Scroll here!) -->
        <div class="spacer"></div>

        <!-- Card 2: FCF Gauge -->
        <div class="metric-card">
            <span class="label">Free Cash Flow Strength</span>
            <div class="gauge-wrapper">
                <div class="gauge-bg"></div>
                <div id="needle" class="needle"></div>
            </div>
            <div id="fcfLabel" style="font-size: 1.4rem; font-weight: 800; margin: 10px 0;">---</div>
            
            <p style="font-size: 0.75rem; color: #8b949e; line-height: 1.6; margin-top: 15px;">
                <span style="color:var(--strong)">●</span> Strong: >15% Growth<br>
                <span style="color:var(--mod)">●</span> Moderate: 5-15% Margin<br>
                <span style="color:var(--neg)">●</span> Negative: < 0% (Cash Burn)
            </p>
        </div>
    </div>
</div>

<script>
    const sgxStocks = [
        { ticker: "D05", name: "DBS Group", yield: 5.2 },
        { ticker: "U11", name: "UOB Bank", yield: 5.1 },
        { ticker: "O39", name: "OCBC Bank", yield: 4.8 },
        { ticker: "Z74", name: "Singtel", yield: 4.2 },
        { ticker: "S68", name: "SGX Group", yield: 3.8 },
        { ticker: "A17U", name: "Ascendas REIT", yield: 5.9 },
        { ticker: "C38U", name: "CICT", yield: 5.5 },
        { ticker: "M44U", name: "Mapletree Log", yield: 6.1 },
        { ticker: "S63", name: "ST Engineering", yield: 4.1 },
        { ticker: "C52", name: "ComfortDelGro", yield: 5.3 }
    ];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function init() {
        const listContainer = document.getElementById('stockList');
        sgxStocks.forEach(stock => {
            const div = document.createElement('div');
            div.className = 'stock-item';
            div.innerHTML = `<strong>${stock.ticker}</strong> - ${stock.name}`;
            div.onclick = () => { selectStock(stock.ticker, div, stock.yield); toggleSidebar(); };
            listContainer.appendChild(div);
        });
        selectStock(sgxStocks[0].ticker, listContainer.firstChild, sgxStocks[0].yield);
    }

    function handleSearch(e) {
        if (e.key === 'Enter') {
            const val = e.target.value.trim().toUpperCase();
            if (val) { selectStock(val, null, 0); toggleSidebar(); }
        }
    }

    function selectStock(ticker, element, yieldVal) {
        if (element) {
            document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
        const symbol = "SGX:" + ticker;
        document.getElementById('analysisLabel').innerText = `Analysis: ${symbol}`;
        
        updateVerdict(yieldVal, ticker);

        const divContainer = document.getElementById('div-viewport');
        divContainer.innerHTML = '';
        const script = document.createElement('script');
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-financials.js";
        script.async = true;
        script.innerHTML = JSON.stringify({
            "symbol": symbol, "colorTheme": "dark", "isTransparent": true,
            "displayMode": "regular", "width": "100%", "height": "100%", "locale": "en"
        });
        divContainer.appendChild(script);
        updateFCFGauge(ticker);
    }

    function updateVerdict(yieldVal, ticker) {
        const icon = document.getElementById('verdictIcon');
        const text = document.getElementById('verdictText');
        if(yieldVal === 0) yieldVal = (ticker.charCodeAt(0) % 7 + 2); 

        if (yieldVal >= 5) {
            icon.innerText = "✅";
            text.innerText = `Yield Met (${yieldVal}%)`;
            text.className = "green-text";
        } else {
            icon.innerText = "❌";
            text.innerText = `Yield < 5% (${yieldVal}%)`;
            text.className = "red-text";
        }
    }

    function updateFCFGauge(ticker) {
        const needle = document.getElementById('needle');
        const label = document.getElementById('fcfLabel');
        label.innerText = "...";
        setTimeout(() => {
            const values = [
                { angle: -65, text: "NEGATIVE", color: "#f23645" },
                { angle: -25, text: "WEAK", color: "#ffb347" },
                { angle: 25, text: "MODERATE", color: "#71d5c2" },
                { angle: 65, text: "STRONG", color: "#089981" }
            ];
            let index = (ticker.charCodeAt(0) + ticker.length) % 4;
            const result = values[index];
            needle.style.transform = `rotate(${result.angle}deg)`;
            label.innerText = result.text;
            label.style.color = result.color;
        }, 500);
    }

    window.onload = init;
</script>
</body>
</html>
