<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronald's SGX Stock Analysis</title>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar: #161b22;
            --card: #1c2128;
            --sgx-red: #e91e63;
            --text: #c9d1d9;
            --strong: #089981;
            --mod: #71d5c2;
            --weak: #ffb347;
            --neg: #f23645;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Main Header */
        .app-header {
            background: var(--sidebar);
            padding: 15px 25px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .app-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--sgx-red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .layout-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .search-container {
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }

        .search-container input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .stock-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
        }
        .stock-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.85rem;
        }
        .stock-item:hover { background: #21262d; }
        .stock-item.active {
            background: #21262d;
            border-left-color: var(--sgx-red);
            font-weight: bold;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .metric-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #30363d;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            text-align: center;
        }
        .label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        /* Gauge Styles */
        .gauge-wrapper { position: relative; width: 200px; height: 100px; margin: 0 auto 10px; overflow: hidden; }
        .gauge-bg {
            width: 200px; height: 200px; border-radius: 50%;
            background: conic-gradient(from 270deg, var(--neg) 25%, var(--weak) 50%, var(--mod) 75%, var(--strong) 100%);
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }
        .needle {
            position: absolute; width: 4px; height: 75px; background: #fff;
            bottom: 0; left: calc(50% - 2px); transform-origin: bottom;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg); border-radius: 4px;
        }
        .fcf-status { font-size: 1.3rem; font-weight: 800; margin-top: 10px; }

        /* Definition Table */
        .definition-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 0.7rem;
            text-align: left;
        }
        .definition-table th, .definition-table td {
            padding: 8px;
            border-bottom: 1px solid #30363d;
        }
        .definition-table th { color: #8b949e; text-transform: uppercase; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<header class="app-header">
    <h1>Ronald's SGX Stock Analysis</h1>
    <div style="font-size: 0.7rem; color: #8b949e;">Market Data: TradingView</div>
</header>

<div class="layout-body">
    <div class="sidebar">
        <div class="search-container">
            <input type="text" id="manualSearch" placeholder="Search Ticker (e.g. D05)" onkeypress="handleSearch(event)">
        </div>
        <div class="stock-list" id="stockList">
            <!-- Curated list -->
        </div>
    </div>

    <div class="main-content">
        <!-- STOCK ANALYSIS SECTION -->
        <div class="metric-card">
            <span class="label" id="analysisLabel">Stock Analysis: SGX:D05</span>
            <div id="div-viewport" style="height: 250px; overflow: hidden; border-radius: 8px;"></div>
        </div>

        <!-- FCF STRENGTH GAUGE -->
        <div class="metric-card">
            <span class="label">Free Cash Flow (FCF) Strength</span>
            <div class="gauge-wrapper">
                <div class="gauge-bg"></div>
                <div id="needle" class="needle"></div>
            </div>
            <div id="fcfLabel" class="fcf-status">---</div>
            
            <table class="definition-table">
                <thead>
                    <tr>
                        <th>Rating</th>
                        <th>FCF Margin Range</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><span class="dot" style="background:var(--strong)"></span> Strong</td>
                        <td>15% - 20%+ Growth / Yield</td>
                    </tr>
                    <tr>
                        <td><span class="dot" style="background:var(--mod)"></span> Moderate</td>
                        <td>5% - 15% Margin</td>
                    </tr>
                    <tr>
                        <td><span class="dot" style="background:var(--weak)"></span> Weak</td>
                        <td>0% - 5% or Weakening</td>
                    </tr>
                    <tr>
                        <td><span class="dot" style="background:var(--neg)"></span> Negative</td>
                        <td>Less than 0% (Cash Burn)</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const sgxStocks = [
        { ticker: "D05", name: "DBS Group" },
        { ticker: "U11", name: "UOB Bank" },
        { ticker: "O39", name: "OCBC Bank" },
        { ticker: "Z74", name: "Singtel" },
        { ticker: "S68", name: "SGX Group" },
        { ticker: "C31", name: "CapitaLand Inv" },
        { ticker: "A17U", name: "Ascendas REIT" },
        { ticker: "C38U", name: "CapitaLand IntCom" },
        { ticker: "M44U", name: "Mapletree Log Tr" },
        { ticker: "S63", name: "ST Engineering" },
        { ticker: "BN4", name: "Keppel Ltd" },
        { ticker: "V03", name: "Venture Corp" },
        { ticker: "C52", name: "ComfortDelGro" }
    ];

    function init() {
        const listContainer = document.getElementById('stockList');
        sgxStocks.forEach(stock => {
            const div = document.createElement('div');
            div.className = 'stock-item';
            div.innerHTML = `<strong>${stock.ticker}</strong> ${stock.name}`;
            div.onclick = () => selectStock(stock.ticker, div);
            listContainer.appendChild(div);
        });
        selectStock(sgxStocks[0].ticker, listContainer.firstChild);
    }

    function handleSearch(e) {
        if (e.key === 'Enter') {
            const val = e.target.value.trim().toUpperCase();
            if (val) {
                // Clear active state from list
                document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
                selectStock(val, null);
            }
        }
    }

    function selectStock(ticker, element) {
        if (element) {
            document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        const symbol = "SGX:" + ticker;
        document.getElementById('analysisLabel').innerText = `Stock Analysis: ${symbol}`;

        // 1. Update Stock Analysis Widget
        const divContainer = document.getElementById('div-viewport');
        divContainer.innerHTML = '';
        const script = document.createElement('script');
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-financials.js";
        script.async = true;
        script.innerHTML = JSON.stringify({
            "symbol": symbol,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "regular",
            "width": "100%",
            "height": "100%",
            "locale": "en"
        });
        divContainer.appendChild(script);

        // 2. Update Gauge
        updateFCFGauge(ticker);
    }

    function updateFCFGauge(ticker) {
        const needle = document.getElementById('needle');
        const label = document.getElementById('fcfLabel');
        
        label.innerText = "...";
        
        setTimeout(() => {
            const values = [
                { angle: -65, text: "NEGATIVE", color: "#f23645" },
                { angle: -25, text: "WEAK", color: "#ffb347" },
                { angle: 25, text: "MODERATE", color: "#71d5c2" },
                { angle: 65, text: "STRONG", color: "#089981" }
            ];
            
            // Simulation logic
            let index = (ticker.charCodeAt(0) + ticker.length) % 4;
            const result = values[index];
            
            needle.style.transform = `rotate(${result.angle}deg)`;
            label.innerText = result.text;
            label.style.color = result.color;
        }, 500);
    }

    window.onload = init;
</script>

</body>
</html>
