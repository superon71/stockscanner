<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time RSI Market Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #131722;
            color: #d1d4dc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: #2962ff; margin-bottom: 5px; }
        p { color: #787b86; }
        
        .scanner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .widget-container {
            background: #1e222d;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #2a2e39;
            margin-bottom: 20px;
        }
        .label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }
        .oversold-text { color: #089981; } /* Green */
        .overbought-text { color: #f23645; } /* Red */

        /* Search & Analysis Styles */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #363c4e;
            background: #131722;
            color: white;
            width: 200px;
            text-transform: uppercase;
        }
        button {
            padding: 10px 20px;
            background: #2962ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #1e4bd8; }
        
        #analysis-viewport, #prediction-viewport {
            width: 100%;
            min-height: 450px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Ronald's Beta Technical RSI Scanner</h1>
    <p>Live NYSE & NASDAQ Market Sentiment (RSI & Support Levels)</p>
</header>

<div class="scanner-grid">
    <div class="widget-container">
        <span class="label oversold-text">Potentially OVERSOLD (Buy Interest)</span>
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
            {
            "width": "100%",
            "height": 500,
            "defaultColumn": "overview",
            "defaultScreen": "oversold",
            "market": "america",
            "showToolbar": true,
            "colorTheme": "dark",
            "locale": "en"
            }
            </script>
        </div>
    </div>

    <div class="widget-container">
        <span class="label overbought-text">Potentially OVERBOUGHT (Sell Interest)</span>
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
            {
            "width": "100%",
            "height": 500,
            "defaultColumn": "overview",
            "defaultScreen": "overbought",
            "market": "america",
            "showToolbar": true,
            "colorTheme": "dark",
            "locale": "en"
            }
            </script>
        </div>
    </div>
</div>

<div style="margin-top: 30px; width: 100%; max-width: 1200px;" class="widget-container">
    <div class="search-box">
        <input type="text" id="symbolSearch" placeholder="Enter Symbol (e.g. NVDA)">
        <button onclick="changeSymbol()">Analyze & Predict</button>
    </div>

    <span class="label">Stock Technicals & Support/Resistance</span>
    <div id="analysis-viewport"></div>

    <span class="label" style="margin-top: 40px; border-top: 1px solid #363c4e; padding-top: 20px;">12-Month Analyst Price Forecast</span>
    <div id="prediction-viewport"></div>
</div>

<script>
    function changeSymbol() {
        const input = document.getElementById('symbolSearch');
        const symbol = input.value.trim().toUpperCase() || "NASDAQ:AAPL";
        
        // --- Technical Analysis Widget ---
        const analysisViewport = document.getElementById('analysis-viewport');
        analysisViewport.innerHTML = '';
        const analysisScript = document.createElement('script');
        analysisScript.type = 'text/javascript';
        analysisScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
        analysisScript.async = true;
        analysisScript.innerHTML = JSON.stringify({
            "interval": "1D",
            "width": "100%",
            "isTransparent": false,
            "height": 450,
            "symbol": symbol,
            "showIntervalTabs": true,
            "displayMode": "multiple",
            "locale": "en",
            "colorTheme": "dark"
        });
        analysisViewport.appendChild(analysisScript);

        // --- Price Prediction Widget ---
        const predictionViewport = document.getElementById('prediction-viewport');
        predictionViewport.innerHTML = '';
        const predictionScript = document.createElement('script');
        predictionScript.type = 'text/javascript';
        predictionScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-profile.js';
        predictionScript.async = true;
        predictionScript.innerHTML = JSON.stringify({
            "width": "100%",
            "height": 450,
            "colorTheme": "dark",
            "isTransparent": false,
            "symbol": symbol,
            "locale": "en"
        });
        predictionViewport.appendChild(predictionScript);
    }

    // Initialize with Apple on load
    window.onload = changeSymbol;
</script>

</body>
</html>
