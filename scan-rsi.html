<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronald's Stock RSI Scanner</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, button { padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        input[type="text"] { flex-grow: 1; }
        button { background-color: #3498db; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        
        .oversold { color: #27ae60; font-weight: bold; background: #e8f5e9; }
        .overbought { color: #e74c3c; font-weight: bold; background: #fdedec; }
        .status { font-style: italic; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ronald's Stock RSI Scanner</h1>
    
    <div class="controls">
        
        <input type="text" id="symbols" placeholder="Symbols (e.g. AAPL, TSLA, MSFT, AMD)" value="AAPL, TSLA, MSFT, AMD, NVDA, GOOGL">
        <button id="scanBtn" onclick="startScan()">Start Scan</button>
    </div>

    <div id="status" class="status">Enter your stocks and click scan.</div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>RSI (14-Day)</th>
                <th>Signal</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            </tbody>
    </table>
</div>

<script>
    apiKey="QIAXWL7POLW4J64B"
    async function fetchRSI(symbol, apiKey) {
        const url = `https://www.alphavantage.co/query?function=RSI&symbol=${symbol}&interval=daily&time_period=14&series_type=close&apikey=${apiKey}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data["Note"]) throw new Error("API Limit Reached");
        if (data["Error Message"]) throw new Error("Invalid Symbol or API Key");
        
        // Alpha Vantage returns a time series; we want the most recent value
        const timeSeries = data["Technical Analysis: RSI"];
        const lastDate = Object.keys(timeSeries)[0];
        return {
            rsi: parseFloat(timeSeries[lastDate]["RSI"]).toFixed(2),
            date: lastDate
        };
    }

    async function startScan() {
        
        const apiKey = "QIAXWL7POLW4J64B";
        const symbolInput = document.getElementById('symbols').value.toUpperCase();
        const symbols = symbolInput.split(',').map(s => s.trim()).filter(s => s);
        const statusDiv = document.getElementById('status');
        const resultsBody = document.getElementById('resultsBody');
        const scanBtn = document.getElementById('scanBtn');


        scanBtn.disabled = true;
        resultsBody.innerHTML = '';
        
        for (let i = 0; i < symbols.length; i++) {
            const symbol = symbols[i];
            statusDiv.innerText = `Scanning ${symbol}... (${i + 1}/${symbols.length})`;
            
            try {
                // To avoid "rate limit" issues on free keys (5 calls/min usually), 
                // we add a small delay between requests
                if (i > 0) await new Promise(resolve => setTimeout(resolve, 12000)); 

                const data = await fetchRSI(symbol, apiKey);
                const rsi = data.rsi;
                let signal = "Neutral";
                let rowClass = "";

                if (rsi >= 70) {
                    signal = "Overbought";
                    rowClass = "overbought";
                } else if (rsi <= 30) {
                    signal = "Oversold";
                    rowClass = "oversold";
                }

                const row = `<tr class="${rowClass}">
                    <td><strong>${symbol}</strong></td>
                    <td>${rsi}</td>
                    <td>${signal}</td>
                    <td>${data.date}</td>
                </tr>`;
                
                resultsBody.innerHTML += row;

            } catch (err) {
                console.error(err);
                resultsBody.innerHTML += `<tr><td>${symbol}</td><td colspan="3" style="color:red">Error: ${err.message}</td></tr>`;
                if (err.message.includes("Limit")) break;
            }
        }

        statusDiv.innerText = "Scan complete.";
        scanBtn.disabled = false;
    }
</script>

</body>
</html>
